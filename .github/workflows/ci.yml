name: CI (build check)

on:
  pull_request:
    branches: [main, integration, 'integration/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        env:
          MODEL_REPO_TOKEN: ${{ secrets.MODEL_REPO_TOKEN }}
        run: |
          printf '%s' "$MODEL_REPO_TOKEN" > /tmp/gh_token
          DOCKER_BUILDKIT=1 docker build \
            --secret id=github_token,src=/tmp/gh_token \
            -t control-backend:ci .
          rm -f /tmp/gh_token

      - name: Smoke (부팅 + /health)
        run: |
          docker run -d --name ci -p 8000:8000 control-backend:ci
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/health || true)
            if [ "$code" = "200" ]; then echo "health OK"; exit 0; fi
            sleep 2
          done
          docker logs ci
          echo "health FAILED"
          exit 1
