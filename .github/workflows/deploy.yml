name: Build and Deploy (control_backend)

on:
  push:
    tags: ['v*']          # 태그 푸시 시에만 prod 배포

env:
  IMAGE_NAME: ghcr.io/signal-craft-dev-team/202606-v1-control-backend
  CONTAINER: control-backend
  DOMAIN: https://v1.api.prod.control.signalcraft.kr
  # DB 접속 정보 — 비밀(USER/PASSWORD)은 secret, 비민감 값은 리터럴
  DB_HOST: 10.178.0.3      # DB VM 내부 IP (VPC 내부 경로). 내부 DNS 이름도 가능
  DB_PORT: '5432'
  DB_NAME: signalcraft
  MQTT_HOST: mqtt.kr001.signalcraft.kr
  MQTT_PORT: '8883'
jobs:
  # ─────────────────────────────────────────
  # 1. Docker 빌드 & GHCR 푸시
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          secrets: |
            github_token=${{ secrets.MODEL_REPO_TOKEN }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # 2. control-backend-prod 배포 (SSH) + 스모크 + 롤백
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to control-backend-prod
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_USER: ${{ secrets.V1_GCP_VM_DB_CBE_USER }}
          DB_PASS: ${{ secrets.V1_GCP_VM_DB_CBE_PASSWORD }}
          MQTT_USER: ${{ secrets.V1_GCP_MQTT_KR001_USER }}
          MQTT_PASS: ${{ secrets.V1_GCP_MQTT_KR001_PASSWORD }}
        with:
          host: ${{ secrets.V1_GCP_VM_PROD_CONTROL_HOST }}
          username: ${{ secrets.V1_GCP_VM_PROD_CONTROL_USER }}
          key: ${{ secrets.V1_GCP_VM_SSH_KEY }}
          envs: DB_USER,DB_PASS,MQTT_USER,MQTT_PASS     # secret을 원격 셸 env로 안전 전달(인라인 보간 X)
          script: |
            set -e
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            # 롤백용 직전 이미지 ID 기록 (없으면 빈 값)
            docker inspect --format='{{.Image}}' ${{ env.CONTAINER }} 2>/dev/null > /tmp/control_prev_image || echo "" > /tmp/control_prev_image
            docker pull ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            docker rm -f dummy 2>/dev/null || true            # 더미 컨테이너 제거(포트 8000 확보)
            docker rm -f ${{ env.CONTAINER }} 2>/dev/null || true
            docker run -d --name ${{ env.CONTAINER }} --restart unless-stopped \
              -p 8000:8000 \
              -e PGHOST=${{ env.DB_HOST }} -e PGPORT=${{ env.DB_PORT }} -e PGDATABASE=${{ env.DB_NAME }} \
              -e PGUSER="$DB_USER" -e PGPASSWORD="$DB_PASS" \
              -e MQTT_HOST=${{ env.MQTT_HOST }} -e MQTT_PORT=${{ env.MQTT_PORT }} \
              -e MQTT_USER="$MQTT_USER" -e MQTT_PASSWORD="$MQTT_PASS" \
              ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Smoke test (/health)
        run: |
          for i in $(seq 1 6); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 ${{ env.DOMAIN }}/health || true)
            if [ "$code" = "200" ]; then echo "smoke OK"; exit 0; fi
            echo "retry $i (got $code)"; sleep 5
          done
          echo "smoke FAILED"; exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_USER: ${{ secrets.V1_GCP_VM_DB_CBE_USER }}
          DB_PASS: ${{ secrets.V1_GCP_VM_DB_CBE_PASSWORD }}
          MQTT_USER: ${{ secrets.V1_GCP_MQTT_KR001_USER }}
          MQTT_PASS: ${{ secrets.V1_GCP_MQTT_KR001_PASSWORD }}
        with:
          host: ${{ secrets.V1_GCP_VM_PROD_CONTROL_HOST }}
          username: ${{ secrets.V1_GCP_VM_PROD_CONTROL_USER }}
          key: ${{ secrets.V1_GCP_VM_SSH_KEY }}
          envs: DB_USER,DB_PASS
          script: |
            PREV=$(cat /tmp/control_prev_image)
            if [ -n "$PREV" ]; then
              echo "rolling back to $PREV"
              docker rm -f ${{ env.CONTAINER }} 2>/dev/null || true
              docker run -d --name ${{ env.CONTAINER }} --restart unless-stopped \
                -p 8000:8000 \
                -e PGHOST=${{ env.DB_HOST }} -e PGPORT=${{ env.DB_PORT }} -e PGDATABASE=${{ env.DB_NAME }} \
                -e PGUSER="$DB_USER" -e PGPASSWORD="$DB_PASS" \
                -e MQTT_HOST=${{ env.MQTT_HOST }} -e MQTT_PORT=${{ env.MQTT_PORT }} \
                -e MQTT_USER="$MQTT_USER" -e MQTT_PASSWORD="$MQTT_PASS" \
                "$PREV"
            else
              echo "no previous image (first deploy) — nothing to roll back"
            fi

      - name: Prune old images (on success)
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.V1_GCP_VM_PROD_CONTROL_HOST }}
          username: ${{ secrets.V1_GCP_VM_PROD_CONTROL_USER }}
          key: ${{ secrets.V1_GCP_VM_SSH_KEY }}
          script: docker image prune -f
